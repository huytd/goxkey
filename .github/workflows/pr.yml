on:
  push:
    branches-ignore:
      - 'main'

name: Pull request

jobs:
  test:
    name: Test project
    runs-on: macos-11 # add other OS later
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test cargo-bundle
  build:
    name: Build project
    runs-on: macos-11 # add other OS later
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-bundle
      - run: cargo bundle --release
